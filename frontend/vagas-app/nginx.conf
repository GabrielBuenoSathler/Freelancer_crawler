server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interno do Docker: resolve o nome do servico em tempo de
    # requisicao, evitando "host not found in upstream" no boot do nginx
    # quando o container "app" ainda nao esta no ar.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SPA: redireciona 404 para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o backend FastAPI
    location ~ ^/(token|users|user_profile|vagas_workana|vagas_99freelas|match_vagas|profile|docs|openapi.json) {
        # host via variavel: forca o nginx a resolver no resolver acima
        # (em tempo de requisicao) em vez de no carregamento da config.
        set $backend app;
        proxy_pass http://$backend:8000;
        # /match_vagas pode demorar quando os embeddings precisam ser regenerados
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
