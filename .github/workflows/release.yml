name: Build & Push images

# Builda as imagens da api e do frontend e empurra pro GitHub Container
# Registry (ghcr.io). A VPS so faz `pull` + `up` do docker-compose.prod.yaml.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # necessario pra dar push no ghcr.io
    strategy:
      matrix:
        include:
          - image: freelancer-api
            context: .
            dockerfile: ./Dockerfile
          - image: freelancer-frontend
            context: ./frontend/vagas-app
            dockerfile: ./frontend/vagas-app/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gera tags/labels automaticamente. O nome da imagem e' minusculado
      # aqui (ghcr.io exige lowercase), entao o owner pode ter maiuscula.
      - name: Metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
