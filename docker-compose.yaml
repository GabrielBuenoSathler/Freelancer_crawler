# Use postgres/example user/password credentials

version: '3.8'

services:
  db:
    image: postgres
    container_name: postgres-db
    ports:
      - "5432:5432"
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: FREELANCERS
    volumes:
    - ./postgres-data:/var/lib/postgresql

    

