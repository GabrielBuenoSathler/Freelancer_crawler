# Use postgres/example user/password credentials

version: '3.8'

services:
  db:
    image: postgres
    container_name: postgres-db
    ports:
      - "5432:5432"
    restart: always
    shm_size: 128mb
    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
    - ./postgres-data:/var/lib/postgresql

    

