services:
  app:
    build: .
    image: gabrielbueno123/api:latest
    container_name: minha_api
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-}

  frontend:
    build:
      context: ./frontend/vagas-app
      dockerfile: Dockerfile
    image: gabrielbueno123/frontend:latest
    container_name: minha_frontend
    ports:
      - "80:80"
    depends_on:
      - app

  db:
    image: postgres
    container_name: postgres-db
    ports:
      - "5432:5432"
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql
